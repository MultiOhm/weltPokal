<!DOCTYPE html>

<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>weltPokal</title>
<link rel="stylesheet" href="css/kitcard.css">
</head>

<body>

<div id="header"></div>


<main>
<div class="card">
    <div class="card-box">
        <div class="frame-box">
            <div class="frame">
                <div class="flag">
                    <img src="flags/fr.png" id="flag">
                </div>

                <div class="top">
                    <div class="year" id="year">2027</div>
                    
                </div>

                <div class="render" id="render">
                    <img src="renders/frah25.png">
                </div>
            </div>
        </div>

        <div class="bottom">

            <div class="country" id="country">FRANCE</div>

            <div class="type" id="type">HOME</div>


        </div>
    </div>
</div>




<div id="cardContainer">

</div>
</main>
<script src="js/config.js"></script>
<script src="js/loadHeader.js"></script>
<script src="js/team-loader.js"></script>
<script src="js/kitcard.js"></script>

</body>

</html>
