<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>weltPokal</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/team.css">
<link rel="stylesheet" href="css/matchcard.css">
</head>

<body>

<div id="header"></div>

<main class="team-page">

    <section class="team-hero">


    <div class="hero-left">

        <img id="teamFlag" class="team-flag">

        <h1 id="teamName">HelloHelloHelloHello</h1>

        <p id="teamRegion"></p>

    </div>


    <div class="hero-right">

        <div class="hero-stat">

            <span>Teilnahmen</span>

            <b id="statParticipations">0</b>

        </div>

        <div class="hero-stat">

            <span>Titel</span>

            <b id="statTitles">0</b>

        </div>

        <div class="hero-stat">

            <span>Spiele</span>

            <b id="statMatches">0</b>

        </div>

        <div class="hero-stat">

            <span>Tore</span>

            <b id="statGoals">0</b>

        </div>

    </div>

</section>

<div class="history">

    <div class="history-scroll">

        <div class="history-line"></div>

        <div id="history" class="history-events"></div>

    </div>

</div>

<section class="team-grid">
    <div class="left-column">
        <div class="team-news">

            <h2>News</h2>

        </div>

        <section class="team-kits">

            <h2>Trikothistorie</h2>

            <div class="kit-slider">


                <div class="kit-track" id="kit-track">

                </div>
                <div class="kit-track-buttons">
                    <button class="prev">‹</button>
                    <button class="next">›</button>
                </div>

            </div>

        </section>
    </div>

<div class="team-matches">

<h2>Spiele</h2>

<div id="recentMatches"></div>

</div>
</section>

</main>
<script src="js/config.js"></script>
<script src="js/loadHeader.js"></script>
<script src="js/team-loader.js"></script>
<script src="js/team.js"></script>

</body>

</html>
