<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>weltPokal 2022 | Gruppe A</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/groups.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/matchcard.css">


</head>

<body>

<div id="header"></div>

<main>

<section class="group-header">
    <div class="group-info">
        <h1 id="tournament">weltPokal 2025</h1>
        <h2 id="host">Kolumbien</h2>
    </div>
    <span></span>
    <div class="group-teams">
        <a id="team1">Team 1</a>
        <a id="team2">Team 2</a>
        <a id="team3">Team 3</a>
        <a id="team4">Team 4</a>
    </div>
</section>


<section class="group-content">

    <div class="matches-column">

        <h3>Spiele</h3>

        <div class="group-matches" id="groupMatches">

            <!-- per JS laden -->

        </div>

    </div>


    <div class="table-column">

        <h3>Tabelle</h3>

        <div class="group-table" id="groupStandings"></div>

    </div>

</section>
<div id="match-popup" class="popup">

    <div class="popup-box">

        <button class="close-popup">
            ×
        </button>


        <div class="popup-teams">
            <div class="popup-flag-home">
                <img id="popup-home-img" src="../../flags/pt.png">
            </div>
            <div id="popup-home" style="text-align: left;">
                Portugal
            </div>


            <div id="popup-score" style="text-align: center;">
                1:0
            </div>


            <div id="popup-away" style="text-align: right;">
                Algerien
            </div>
            <div class="popup-flag-home">
                <img id="popup-away-img" src="../../flags/ch.png">
            </div>

        </div>


        <div class="popup-scorers">

            <!-- später Torschützen -->

        </div>


        <div id="popup-stadium">
            
        </div>


    </div>

</div>

</main>

<script src="js/config.js"></script>
<script src="js/team-loader.js"></script>
<script src="js/tournament-loader.js"></script>
<script src="js/match-card.js"></script>
<script src="js/loadHeader.js"></script>
<script src="js/group-a.js"></script>
<script src="js/popup.js"></script>

</body>
</html>
