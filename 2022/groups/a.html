<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>weltPokal 2022 | Gruppe A</title>

    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/groups.css">
    <link rel="stylesheet" href="../../css/index.css"


</head>

<body>

<div id="header"></div>

<main>

<section class="group-header">

    <h1>weltPokal 2022</h1>

    <h2>Gruppe A</h2>

    <div class="group-teams">

        🇵🇹 Portugal - 
        🇩🇿 Algerien - 
        🇺🇾 Uruguay - 
        🇳🇱 Niederlande

    </div>

</section>


<section class="group-content">

    <div class="matches-column">

        <h3>Spiele</h3>

        <div class="group-matches" id="groupMatches">

            <!-- per JS laden -->

        </div>

    </div>


    <div class="table-column">

        <h3>Tabelle</h3>

        <table class="standings">

            <thead>

            <tr>

                <th>#</th>
                <th>Team</th>
                <th>Sp</th>
                <th>S</th>
                <th>U</th>
                <th>N</th>
                <th>TD</th>
                <th>P</th>

            </tr>

            </thead>

            <tbody>

            <tr>

                <td>1</td>
                <td style="text-align: left;">🇵🇹 Portugal</td>
                <td>3</td>
                <td>2</td>
                <td>1</td>
                <td>0</td>
                <td>6:2</td>
                <td>7</td>

            </tr>

            <tr>

                <td>2</td>
                <td style="text-align: left;">🇺🇾 Uruguay</td>
                <td>3</td>
                <td>1</td>
                <td>2</td>
                <td>0</td>
                <td>5:3</td>
                <td>5</td>

            </tr>

            <tr>

                <td>3</td>
                <td style="text-align: left;">🇳🇱 Niederlande</td>
                <td>3</td>
                <td>1</td>
                <td>1</td>
                <td>1</td>
                <td>4:4</td>
                <td>4</td>

            </tr>

            <tr>

                <td>4</td>
                <td style="text-align: left;">🇩🇿 Algerien</td>
                <td>3</td>
                <td>0</td>
                <td>0</td>
                <td>3</td>
                <td>2:8</td>
                <td>0</td>

            </tr>

            </tbody>

        </table>

    </div>

</section>
<div id="match-popup" class="popup">

    <div class="popup-box">

        <button class="close-popup">
            ×
        </button>


        <div class="popup-teams">
            <div class="popup-flag-home">
                <img src="../../flags/pt.png">
            </div>
            <div id="popup-home">
                Portugal
            </div>


            <div id="popup-score">
                1:0
            </div>


            <div id="popup-away">
                Algerien
            </div>
            <div class="popup-flag-home">
                <img src="../../flags/dz.png">
            </div>

        </div>


        <div class="popup-scorers">

            <!-- später Torschützen -->

        </div>


        <div id="popup-stadium">
            Stadion
        </div>


    </div>

</div>

</main>
<script src="../../js/config.js"></script>
<script src="../../js/loadHeader.js"></script>


<script src="../../js/group-a.js"></script>

</body>
</html>
