<body>

<div id="header"></div>

<main>

<section class="page-title">

    <h1>Trikotgalerie</h1>

    <p>
        Alle Trikots des weltPokal seit 2015.
    </p>

</section>

<section class="filter-box">

    <h2>Länder</h2>

    <div id="country-filter">

        <button class="flag-btn active" data-country="all">🌍</button>
        <button class="flag-btn" data-country="ar">
            <img src="flags/ar.png">
        </button>

        <button class="flag-btn" data-country="co">
            <img src="flags/co.png">
        </button>
        <button class="flag-btn" data-country="fr">
            <img src="flags/fr.png">
        </button>
        <button class="flag-btn" data-country="de">
            <img src="flags/de.png">
        </button>
        <button class="flag-btn" data-country="ir">
            <img src="flags/ir.png">
        </button>
        <button class="flag-btn" data-country="jp">
            <img src="flags/jp.png">
        </button>
        <button class="flag-btn" data-country="ma">
            <img src="flags/ma.png">
        </button>
        <button class="flag-btn" data-country="mx">
            <img src="flags/mx.png">
        </button>

        <button class="flag-btn" data-country="uy">
            <img src="flags/uy.png">
        </button>
    </div>

    <h2>Turniere</h2>

    <div id="year-filter">

        <button class="year-btn active" data-year="all">Alle</button>

        <button class="year-btn" data-year="2015">2015</button>
        <button class="year-btn" data-year="2018">2018</button>
        <button class="year-btn" data-year="2019">2019</button>
        <button class="year-btn" data-year="2020">2020</button>
        <button class="year-btn" data-year="2022">2022</button>
        <button class="year-btn" data-year="2025">2025</button>
        <button class="year-btn" data-year="2027">2027</button>

    </div>

    <h2>Trikottyp</h2>

    <div id="type-filter">

        <button class="type-btn active" data-type="all">Alle</button>

        <button class="type-btn" data-type="home">Home</button>
        <button class="type-btn" data-type="away">Away</button>
        <button class="type-btn" data-type="keeper">Keeper</button>

    </div>

</section>

<p id="result-count"></p>
